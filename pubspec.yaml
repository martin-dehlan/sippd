name: sippd
description: "Wine ranking & sharing app"
publish_to: 'none'
version: 0.1.17+20

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  google_nav_bar: ^5.0.6
  phosphor_flutter: ^2.1.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Data Classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Database (Local-First)
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28

  # Backend (Sync)
  supabase_flutter: ^2.8.3

  # Secure storage (PKCE code-verifier survives Android process death)
  flutter_secure_storage: ^9.2.2

  # Firebase / Push
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Location / Maps
  flutter_map: ^8.0.0
  latlong2: ^0.9.1
  nominatim_flutter: ^0.0.6
  geolocator: ^13.0.2

  # Env
  flutter_dotenv: ^5.2.1

  # Analytics
  posthog_flutter: ^5.24.0

  # Paywall / IAP
  purchases_flutter: ^9.4.0

  # Charts + animation
  fl_chart: ^0.69.0
  flutter_animate: ^4.5.0

  # Share-card image rendering
  screenshot: ^3.0.0

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  path: ^1.9.1
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  add_2_calendar: ^3.0.1
  app_links: ^6.3.0
  shared_preferences: ^2.3.3
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  drift_dev: ^2.22.1

  # Testing
  mocktail: ^1.0.4

  # Branding
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/branding/logo.png
    - assets/branding/logo_icon.png
  fonts:
    - family: Sippd
      fonts:
        - asset: assets/fonts/Sippd.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/logo_icon.png"
  image_path_android: "assets/branding/logo_icon_android.png"
  remove_alpha_ios: true
  background_color_ios: "#14101A"
  adaptive_icon_background: "#14101A"
  adaptive_icon_foreground: "assets/branding/logo_icon.png"
  adaptive_icon_monochrome: "assets/branding/logo_icon_mono.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#14101A"
  image: "assets/branding/logo_splash.png"
  android_12:
    color: "#14101A"
    image: "assets/branding/logo_splash.png"
  ios: true
  android: true
  fullscreen: false
