name: sippd
description: "Wine ranking & sharing app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Data Classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Database (Local-First)
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28

  # Backend (Sync)
  supabase_flutter: ^2.8.3

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Barcode Scanner
  mobile_scanner: ^6.0.2

  # Location / Maps
  flutter_map: ^8.0.0
  latlong2: ^0.9.1
  nominatim_flutter: ^0.0.6

  # Env
  flutter_dotenv: ^5.2.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  path_provider: ^2.1.5
  path: ^1.9.1
  share_plus: ^10.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  drift_dev: ^2.22.1

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env
