name: OSV-Scanner

# Dependency-vulnerability SAST. OSV-Scanner reads pubspec.lock (pub
# ecosystem) and the GitHub Actions pins, and reports known vulnerabilities
# from the OSV database. CodeQL is not used here — it has no Dart support.
#
#   - On PRs: scan only NEW vulnerabilities the branch introduces (fails the PR).
#   - On a schedule + push to main: scan ALL known vulnerabilities and upload
#     SARIF to the Security tab.

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  schedule:
    - cron: '30 12 * * 1'
  push:
    branches: [main]

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  scan-pr:
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8

  scan-scheduled:
    if: github.event_name == 'schedule' || github.event_name == 'push'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
