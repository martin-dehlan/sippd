name: secret-scan

# Backstop scanner for the pre-commit hook. Anyone who bypasses the
# local hook with `--no-verify` (or pushes from a fresh clone before
# running scripts/install-git-hooks.sh) gets caught here. Fails the
# job loudly so the merge is blocked.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: scanning only needs to read repo contents.
permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so the scanner sees every commit on the diff,
          # not just the tip — matches what someone cloning the repo
          # would see.
          fetch-depth: 0

      - name: gitleaks scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
