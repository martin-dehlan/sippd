name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the read-only default token is all this workflow needs
# (checkout + analyze + test). No job widens it.
permissions:
  contents: read

# Cancel superseded runs on the same ref so a fresh push doesn't sit
# behind a stale older one.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: format · analyze · test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: set up flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: 3.41.6
          cache: true

      - name: pub get
        run: flutter pub get

      # Stand up a placeholder firebase_options.dart so the import in
      # main.dart resolves. The real file is gitignored — only the
      # public-API-key-free template is checked in.
      - name: stub firebase_options.dart
        run: cp lib/firebase_options.template.dart lib/firebase_options.dart

      # Empty .env so pubspec's asset-bundle declaration doesn't trip
      # `asset_does_not_exist` warnings during analyze. Real values live
      # per-developer; CI doesn't run anything that needs them.
      - name: stub .env
        run: cp .env.example .env

      # Generated files (Freezed, Riverpod, Drift, json_serializable) are
      # checked in, so codegen runs only when an annotated source has
      # drifted out of sync with its generated output.
      - name: codegen sync check
        run: |
          dart run build_runner build --delete-conflicting-outputs
          if ! git diff --exit-code; then
            echo "::error::Generated files are out of sync with their source. Run 'dart run build_runner build --delete-conflicting-outputs' locally and commit the result."
            exit 1
          fi

      - name: format
        run: dart format --output=none --set-exit-if-changed .

      - name: analyze
        run: flutter analyze --no-fatal-infos

      - name: test
        run: flutter test --reporter=expanded
